<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Главная страница</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #cccccc;
    }

    .app {
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-rows: 62px 1fr;
    }

    .topbar {
      background: #2d2d30;
      border-bottom: 1px solid #3c3c3c;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }

    .topbar__nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
    }

    .topbar__button {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-width: 64px;
      height: 100%;
      padding: 6px 10px;
      background: transparent;
      color: #cccccc;
      border: none;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .topbar__button:hover {
      background: #37373d;
      color: #ffffff;
    }

    .topbar__button:active {
      background: #414148;
    }

    .topbar__icon {
      width: 28px;
      height: 28px;
      display: block;
      flex: 0 0 auto;
      color: #d4d4d4;
    }

    .topbar__icon svg {
      width: 100%;
      height: 100%;
      display: block;
      stroke: currentColor;
    }

    .topbar__label {
      line-height: 1;
    }

    .layout {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: var(--left, 300px) 4px 1fr 4px var(--right, 300px);
      min-height: 0;
    }

    .block {
      height: 100%;
      min-width: 0;
      min-height: 0;
      background: #252526;
      border: none;
      box-shadow: none;
    }

    .block--center {
      background: #1e1e1e;
    }

    .divider {
      cursor: col-resize;
      background: #252526;
      position: relative;
    }

    .divider::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      transform: translateX(-50%);
      background: #313134;
      opacity: 0.7;
    }

    .divider:hover {
      background: #2a2a2d;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <nav class="topbar__nav">
        <button class="topbar__button" type="button" aria-label="Дайсы">
          <span class="topbar__icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M21 8.007v7.986a2 2 0 0 1 -1.006 1.735l-7 4.007a2 2 0 0 1 -1.988 0l-7 -4.007a2 2 0 0 1 -1.006 -1.735v-7.986a2 2 0 0 1 1.006 -1.735l7 -4.007a2 2 0 0 1 1.988 0l7 4.007a2 2 0 0 1 1.006 1.735" />
              <path d="M3.29 6.97l4.21 2.03" />
              <path d="M20.71 6.97l-4.21 2.03" />
              <path d="M20.7 17h-17.4" />
              <path d="M11.76 2.03l-4.26 6.97l-4.3 7.84" />
              <path d="M12.24 2.03q 2.797 4.44 4.26 6.97t 4.3 7.84" />
              <path d="M12 17l-4.5 -8h9l-4.5 8" />
              <path d="M12 17v5" />
            </svg>
          </span>
          <span class="topbar__label">Дайсы</span>
        </button>
      </nav>
    </header>
    <main class="layout" id="layout">
      <aside class="block" id="leftPane"></aside>
      <div class="divider" id="leftDivider"></div>
      <section class="block block--center"></section>
      <div class="divider" id="rightDivider"></div>
      <aside class="block" id="rightPane"></aside>
    </main>
  </div>

  <script>
    const layout = document.getElementById('layout');
    const leftDivider = document.getElementById('leftDivider');
    const rightDivider = document.getElementById('rightDivider');

    let leftWidth = 300;
    let rightWidth = 300;

    function applySizes() {
      layout.style.setProperty('--left', leftWidth + 'px');
      layout.style.setProperty('--right', rightWidth + 'px');
    }

    function startDrag(side, e) {
      e.preventDefault();
      const startX = e.clientX;
      const startLeft = leftWidth;
      const startRight = rightWidth;

      function onMove(ev) {
        const dx = ev.clientX - startX;
        const minSize = 150;
        const maxSize = window.innerWidth - 150;

        if (side === 'left') {
          leftWidth = Math.max(minSize, Math.min(maxSize, startLeft + dx));
        } else {
          rightWidth = Math.max(minSize, Math.min(maxSize, startRight - dx));
        }
        applySizes();
      }

      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    leftDivider.addEventListener('mousedown', (e) => startDrag('left', e));
    rightDivider.addEventListener('mousedown', (e) => startDrag('right', e));

    applySizes();
  </script>
</body>
</html>
